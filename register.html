<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - مؤتمر البيئة والمياه والزراعة</title>
    <meta name="description" content="إنشاء حساب جديد - مؤتمر البيئة والمياه والزراعة">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://mazin-musleh.github.io/ENWACon/register.html">
    <meta name="theme-color" content="#10634b">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./assets/img/Logo.svg">

    <!-- Preload hero background (responsive) -->
    <link rel="preload" as="image" href="./assets/img/heroBg-mobile.webp" media="(max-width: 768px)" fetchpriority="high">
    <link rel="preload" as="image" href="./assets/img/heroBg.webp" media="(min-width: 769px)" fetchpriority="high">

    <!-- Main CSS (Top Priority) -->
    <link rel="stylesheet" href="./assets/css/main.css?ver=1.01">

    <!-- Local Fonts (Deferred) -->
    <link rel="preload" href="./assets/fonts/tajawal.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="./assets/fonts/tajawal.css"></noscript>

    <!-- Font Awesome (Deferred) -->
    <link rel="preload" href="./assets/fontawesome/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="./assets/fontawesome/all.min.css"></noscript>
</head>

<body>
    <!-- Register Section -->
    <main role="main">
        <section class="hero glassy-section lazy-bg login-section" id="register" role="banner" aria-labelledby="register-title">
            <a href="index.html" class="back-home" aria-label="العودة إلى الصفحة الرئيسية">
                <span>العودة للرئيسية</span>
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="container">
                <div class="login-content">
                    <div class="login-logo">
                        <a href="index.html" aria-label="العودة إلى الصفحة الرئيسية">
                            <img src="./assets/img/ALL_WHITE_RGB_NO_BG.svg" alt="شعار مؤتمر البيئة والمياه والزراعة" class="logo-vertical">
                            <img src="./assets/img/Logo_Horizontal_White.svg" alt="شعار مؤتمر البيئة والمياه والزراعة" class="logo-horizontal">
                        </a>
                    </div>

                    <div class="login-form">
                        <h1 class="login-title hero-title" id="register-title">إنشاء حساب</h1>
                        <form>
                            <div class="form-group">
                                <label for="name">الاسم الكامل</label>
                                <input type="text" id="name" name="name" placeholder="أدخل اسمك الكامل" autocomplete="name" required>
                            </div>

                            <div class="form-group">
                                <label for="email">البريد الإلكتروني</label>
                                <input type="email" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" autocomplete="email" required>
                            </div>

                            <div class="form-group">
                                <label for="phone">رقم الجوال</label>
                                <input type="tel" id="phone" name="phone" placeholder="أدخل رقم جوالك" autocomplete="tel" inputmode="tel" required>
                            </div>

                            <div class="form-group">
                                <label for="password">كلمة المرور</label>
                                <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" autocomplete="new-password" required>
                            </div>

                            <div class="form-group">
                                <label for="password-confirm">تأكيد كلمة المرور</label>
                                <input type="password" id="password-confirm" name="password-confirm" placeholder="أعد إدخال كلمة المرور" autocomplete="new-password" required>
                            </div>

                            <div class="form-options">
                                <div class="checkbox-group">
                                    <input type="checkbox" id="terms" name="terms" required>
                                    <label for="terms">أوافق على الشروط والأحكام</label>
                                </div>
                            </div>

                            <button type="submit" class="btn-primary">إنشاء حساب</button>

                            <div class="register-link">
                                <a href="login.html">لديك حساب بالفعل؟ تسجيل الدخول</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <canvas id="dotsCanvas"></canvas>
        </section>
    </main>

    <script src="assets/js/script.js"></script>
</body>

</html>
